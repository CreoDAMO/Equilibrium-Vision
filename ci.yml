name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript workspace ────────────────────────────────────────────────────
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lib declarations (tsc --build)
        run: pnpm run typecheck:libs

      - name: Typecheck all artifacts
        run: pnpm run typecheck

  # ── Rust core library (equilibrium) ─────────────────────────────────────────
  rust-check:
    name: Rust check & clippy (equilibrium)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: equilibrium
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: equilibrium -> target

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Rust core library (variational-ai) ──────────────────────────────────────
  vai-check:
    name: Rust check & clippy (variational-ai)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: variational-ai
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: variational-ai -> target

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── TypeScript tests (Vitest) — all 7 test files, 231 tests ────────────────
  ts-test:
    name: TypeScript tests (Vitest)
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runner
          POSTGRES_PASSWORD: ""
          POSTGRES_DB: equilibrium
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts (variational-ai)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: variational-ai -> target

      - name: Build variational-ai CLI binaries
        working-directory: variational-ai
        run: cargo build --release --bin variational-ai-cli --bin variational-ai-arbitrage-cli

      - name: Copy CLI binaries to api-server directory
        run: |
          cp variational-ai/target/release/variational-ai-cli artifacts/api-server/
          cp variational-ai/target/release/variational-ai-arbitrage-cli artifacts/api-server/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lib declarations
        run: pnpm run typecheck:libs

      - name: Push DB schema
        run: DATABASE_URL="postgresql://runner@localhost:5432/equilibrium" pnpm --filter @workspace/db run push --config ./drizzle.config.ts

      - name: Run all Vitest tests (chain.unit, api.integration, contracts.integration, multisig.integration, models.integration, arbitrage.integration, crosschain.integration)
        run: pnpm --filter @workspace/api-server run test
        env:
          DATABASE_URL: postgresql://runner@localhost:5432/equilibrium

  # ── Rust unit tests (equilibrium) ───────────────────────────────────────────
  rust-test:
    name: Rust unit tests (equilibrium)
    runs-on: ubuntu-latest
    needs: rust-check
    defaults:
      run:
        working-directory: equilibrium
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: equilibrium -> target

      - name: cargo test
        run: cargo test --all-targets

  # ── Rust unit tests (variational-ai) ────────────────────────────────────────
  vai-test:
    name: Rust unit tests (variational-ai)
    runs-on: ubuntu-latest
    needs: vai-check
    defaults:
      run:
        working-directory: variational-ai
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: variational-ai -> target

      - name: cargo test
        run: cargo test --lib

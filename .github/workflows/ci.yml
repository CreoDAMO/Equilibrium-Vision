# ─────────────────────────────────────────────────────────────────────────────
# ci.yml — Typecheck, build, and test the full Equilibrium stack.
#
# This file lives at the repo root because it was authored from Replit, where
# pushing directly into `.github/workflows/` isn't available. Copy this file
# over `.github/workflows/ci.yml` in your GitHub repo to update it.
#
# What changed vs. the currently-committed .github/workflows/ci.yml:
#   - ts-test now also rebuilds the arbitrage, model_registry, and
#     cross_chain_relay WASM contracts from source (via their build.sh
#     scripts) and fails the build if the checked-in .hex artifact drifts
#     from source — closes the "CrossChainRelay in CI" gap called out in the
#     README's Remaining Work section (the compiled .hex could previously
#     drift from source undetected).
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── TypeScript workspace ────────────────────────────────────────────────────
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lib declarations (tsc --build)
        run: pnpm run typecheck:libs

      - name: Typecheck all artifacts
        run: pnpm run typecheck

  # ── Rust core library (equilibrium) ─────────────────────────────────────────
  rust-check:
    name: Rust check & clippy (equilibrium)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: equilibrium
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: equilibrium -> target

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── Rust core library (variational-ai) ──────────────────────────────────────
  vai-check:
    name: Rust check & clippy (variational-ai)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: variational-ai
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: variational-ai -> target

      - name: cargo check
        run: cargo check --all-targets

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # ── TypeScript tests (Vitest) — all 8 test files, 245+ tests (incl. crosschain.integration + arbitrage.stress) ────────────────
  ts-test:
    name: TypeScript tests (Vitest)
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: runner
          POSTGRES_PASSWORD: ""
          POSTGRES_DB: equilibrium
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install pinned WASM contracts toolchain (1.97.0 + wasm32 target)
        # The rust-toolchain.toml in each contracts/ subdirectory pins to 1.97.0
        # so that the checked-in .hex files are reproducible across runs.
        # WASM codegen is NOT byte-for-byte stable across rustc/LLVM versions;
        # a floating "stable" build produces different bytes even if source is
        # unchanged, which would fail the staleness check below.
        run: |
          rustup toolchain install 1.97.0 --profile minimal --target wasm32-unknown-unknown --no-self-update

      - name: Cache Rust build artifacts (variational-ai)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: variational-ai -> target

      - name: Build variational-ai CLI binaries
        working-directory: variational-ai
        run: cargo build --release --bin variational-ai-cli --bin variational-ai-arbitrage-cli

      - name: Copy CLI binaries to api-server directory
        run: |
          cp variational-ai/target/release/variational-ai-cli artifacts/api-server/
          cp variational-ai/target/release/variational-ai-arbitrage-cli artifacts/api-server/

      - name: Cache Rust build artifacts (WASM contracts)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            contracts/arbitrage -> target
            contracts/model_registry -> target
            contracts/cross_chain_relay -> target

      - name: Rebuild WASM contracts from source (keeps checked-in .hex from drifting)
        run: |
          bash contracts/arbitrage/build.sh
          bash contracts/model_registry/build.sh
          bash contracts/cross_chain_relay/build.sh

      - name: Fail if a contract's checked-in .hex is stale vs. its source
        run: |
          git diff --exit-code -- contracts/arbitrage/arbitrage.hex contracts/model_registry/model_registry.hex contracts/cross_chain_relay/cross_chain_relay.hex || {
            echo "::error::A contract's compiled .hex is out of date with its source. Rebuild locally and commit the updated .hex file(s)." >&2
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build lib declarations
        run: pnpm run typecheck:libs

      - name: Push DB schema
        run: DATABASE_URL="postgresql://runner@localhost:5432/equilibrium" pnpm --filter @workspace/db run push --config ./drizzle.config.ts

      - name: Run all Vitest tests (chain.unit, api.integration, contracts.integration, multisig.integration, models.integration, arbitrage.integration, crosschain.integration, arbitrage.stress)
        run: pnpm --filter @workspace/api-server run test
        env:
          DATABASE_URL: postgresql://runner@localhost:5432/equilibrium

  # ── Rust unit tests (equilibrium) ───────────────────────────────────────────
  rust-test:
    name: Rust unit tests (equilibrium)
    runs-on: ubuntu-latest
    needs: rust-check
    defaults:
      run:
        working-directory: equilibrium
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: equilibrium -> target

      - name: cargo test
        run: cargo test --all-targets

  # ── Rust unit tests (variational-ai) ────────────────────────────────────────
  vai-test:
    name: Rust unit tests (variational-ai)
    runs-on: ubuntu-latest
    needs: vai-check
    defaults:
      run:
        working-directory: variational-ai
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: variational-ai -> target

      - name: cargo test
        run: cargo test --lib

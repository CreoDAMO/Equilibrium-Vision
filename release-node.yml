# ─────────────────────────────────────────────────────────────────────────────
# release-node.yml — Build & publish Rust testnet-node / wallet binaries.
#
# This file lives at the repo root because it was authored from Replit, where
# pushing directly into `.github/workflows/` isn't available. Copy this file
# to `.github/workflows/release-node.yml` in your GitHub repo to activate it.
#
# What it does:
#   Cross-compiles the `equilibrium` crate's `testnet-node` and `wallet`
#   binaries for linux-x86_64 and linux-arm64, and attaches them to a GitHub
#   Release when a `node-v*` tag is pushed. Mirrors the existing Android APK
#   release pipeline (android-apk-ci.yml) for the Rust reference stack, which
#   previously had no release automation (see README's Remaining Work).
#
# Trigger:
#   - Manually via workflow_dispatch (Actions tab → Run workflow)
#   - Automatically on pushing a tag like `node-v0.1.0`
#
# No secrets required — these are unsigned, reproducible release binaries
# (not app-store/keystore-signed like the Android APK).
# ─────────────────────────────────────────────────────────────────────────────

name: Release Node Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "node-v*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: equilibrium
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive_suffix: linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive_suffix: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: equilibrium -> target
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin testnet-node --bin wallet

      - name: Package archive
        run: |
          STAGE="equilibrium-node-${{ matrix.archive_suffix }}"
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/testnet-node "$STAGE/"
          cp target/${{ matrix.target }}/release/wallet "$STAGE/"
          cp ../README.md ../LIMITATIONS.md "$STAGE/" 2>/dev/null || true
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          sha256sum "${STAGE}.tar.gz" > "${STAGE}.tar.gz.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: equilibrium-node-${{ matrix.archive_suffix }}
          path: |
            equilibrium/equilibrium-node-${{ matrix.archive_suffix }}.tar.gz
            equilibrium/equilibrium-node-${{ matrix.archive_suffix }}.tar.gz.sha256
          retention-days: 90

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/node-v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            equilibrium/equilibrium-node-${{ matrix.archive_suffix }}.tar.gz
            equilibrium/equilibrium-node-${{ matrix.archive_suffix }}.tar.gz.sha256
          generate_release_notes: true

openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Equilibrium blockchain node RPC + block explorer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chain
    description: Chain state and network info
  - name: blocks
    description: Block data
  - name: transactions
    description: Transaction data
  - name: addresses
    description: Address balances and history
  - name: mempool
    description: Pending transaction pool
  - name: validators
    description: Validator staking, rewards, and slashing
  - name: governance
    description: On-chain governance proposals, voting, and chain parameters
  - name: admin
    description: On-chain M-of-N multisig gate for privileged admin actions (e.g. validator slashing)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /chain/status:
    get:
      operationId: getChainStatus
      tags: [chain]
      summary: Current chain state and network metrics
      responses:
        "200":
          description: Chain status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainStatus"

  /chain/stats:
    get:
      operationId: getChainStats
      tags: [chain]
      summary: Historical network stats for sparklines (last 20 blocks)
      responses:
        "200":
          description: Stats array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockStat"

  /network/peers:
    get:
      operationId: getNetworkPeers
      tags: [chain]
      summary: Connected peer list
      responses:
        "200":
          description: Peer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Peer"

  /blocks:
    get:
      operationId: listBlocks
      tags: [blocks]
      summary: Paginated list of blocks (newest first)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Block page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockPage"

  /blocks/{hashOrHeight}:
    get:
      operationId: getBlock
      tags: [blocks]
      summary: Block detail by hash or height
      parameters:
        - name: hashOrHeight
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Block detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Block"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tx/{hash}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Transaction detail by hash
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transaction detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tx/broadcast:
    post:
      operationId: broadcastTransaction
      tags: [transactions]
      summary: Submit a signed transaction to the mempool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignedTxInput"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResult"
        "400":
          description: Invalid or rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /address/{addr}:
    get:
      operationId: getAddress
      tags: [addresses]
      summary: Address balance, nonce, and transaction history
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Address info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressInfo"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /mempool:
    get:
      operationId: getMempool
      tags: [mempool]
      summary: Pending transactions in the mempool
      responses:
        "200":
          description: Mempool contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mempool"

  /validators:
    get:
      operationId: listValidators
      tags: [validators]
      summary: All validators with bonded stake and share of the network
      responses:
        "200":
          description: Validator list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidatorList"

  /validators/{addr}:
    get:
      operationId: getValidator
      tags: [validators]
      summary: Validator detail, including slash history
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Validator detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidatorDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /validators/{addr}/delegators:
    get:
      operationId: getValidatorDelegators
      tags: [validators]
      summary: Live delegators of a validator with stake, rewards earned, and slash exposure
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delegator list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegatorsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /validators/{addr}/slash:
    post:
      operationId: slashValidator
      tags: [validators]
      summary: Slash a validator. Requires multisig proposal approval when admin multisig is configured, otherwise falls back to the ADMIN_KEY header.
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlashInput"
      responses:
        "200":
          description: Validator slashed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlashResult"
        "400":
          description: Missing reason or proposalId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden — multisig threshold not met or invalid ADMIN_KEY
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Validator not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /admin/multisig:
    get:
      operationId: getAdminMultisigInfo
      tags: [admin]
      summary: Current admin multisig configuration and live on-chain status
      responses:
        "200":
          description: Multisig info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultisigInfo"

  /admin/multisig/propose:
    post:
      operationId: proposeAdminAction
      tags: [admin]
      summary: Create a new admin action proposal (e.g. a pending validator slash) for owners to approve
      responses:
        "200":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposeResult"
        "400":
          description: Admin multisig is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Failed to create proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /admin/multisig/{proposalId}/approve:
    post:
      operationId: approveAdminAction
      tags: [admin]
      summary: Submit one owner's Ed25519-signed approval for a proposal
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveInput"
      responses:
        "200":
          description: Approval recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveResult"
        "400":
          description: Invalid input or admin multisig not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /admin/multisig/{proposalId}:
    get:
      operationId: getAdminMultisigProposalStatus
      tags: [admin]
      summary: Check whether a proposal has met the multisig approval threshold
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proposal status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalStatus"
        "400":
          description: Invalid proposalId or admin multisig not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /governance/proposals:
    get:
      operationId: listProposals
      tags: [governance]
      summary: List all governance proposals with live vote tallies
      responses:
        "200":
          description: Proposal list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalList"
    post:
      operationId: createProposal
      tags: [governance]
      summary: Submit a new governance proposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewProposalInput"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalSummary"
        "400":
          description: Invalid proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /governance/proposals/{id}:
    get:
      operationId: getProposal
      tags: [governance]
      summary: Proposal detail with full voter breakdown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Proposal detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalSummary"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /governance/proposals/{id}/vote:
    post:
      operationId: voteOnProposal
      tags: [governance]
      summary: Cast or change a vote on a governance proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteInput"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"
        "400":
          description: Invalid vote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /governance/params:
    get:
      operationId: getChainParameters
      tags: [governance]
      summary: Current live chain parameters (modifiable via governance)
      responses:
        "200":
          description: Chain parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainParameters"

  /faucet:
    post:
      operationId: requestFaucet
      tags: [faucet]
      summary: Request testnet tokens (1-hour cooldown per address)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaucetRequest"
      responses:
        "200":
          description: Tokens dripped successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaucetDripResponse"
        "400":
          description: Invalid address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limited — cooldown still active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /faucet/status/{address}:
    get:
      operationId: getFaucetStatus
      tags: [faucet]
      summary: Check faucet cooldown status for an address
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Faucet status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaucetStatus"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ChainStatus:
      type: object
      required:
        - height
        - latestHash
        - latestTimestamp
        - totalTxCount
        - mempoolSize
        - mempoolPressure
        - validatorCount
        - cumulativeWork
        - lastResidual
        - avgBlockTime
        - tps
      properties:
        height:
          type: integer
        latestHash:
          type: string
        latestTimestamp:
          type: integer
        totalTxCount:
          type: integer
        mempoolSize:
          type: integer
        mempoolPressure:
          type: number
        validatorCount:
          type: integer
        cumulativeWork:
          type: integer
        lastResidual:
          type: number
        avgBlockTime:
          type: number
        tps:
          type: number

    BlockStat:
      type: object
      required: [height, txCount, residual, mempoolPressure, timestamp]
      properties:
        height:
          type: integer
        txCount:
          type: integer
        residual:
          type: number
        mempoolPressure:
          type: number
        timestamp:
          type: integer

    Peer:
      type: object
      required: [peerId, address, latencyMs, height, connected]
      properties:
        peerId:
          type: string
        address:
          type: string
        latencyMs:
          type: integer
        height:
          type: integer
        connected:
          type: boolean

    Block:
      type: object
      required:
        - hash
        - height
        - prevHash
        - merkleRoot
        - timestamp
        - nonce
        - difficulty
        - residual
        - recursionDepth
        - coinbaseReward
        - miner
        - txCount
        - transactions
      properties:
        hash:
          type: string
        height:
          type: integer
        prevHash:
          type: string
        merkleRoot:
          type: string
        timestamp:
          type: integer
        nonce:
          type: integer
        difficulty:
          type: integer
        residual:
          type: number
        recursionDepth:
          type: integer
        coinbaseReward:
          type: integer
        miner:
          type: string
        txCount:
          type: integer
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"

    BlockPage:
      type: object
      required: [blocks, total, page, limit]
      properties:
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/Block"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Transaction:
      type: object
      required:
        - hash
        - from
        - to
        - amount
        - fee
        - nonce
        - blockHash
        - blockHeight
        - timestamp
        - status
      properties:
        hash:
          type: string
        from:
          type: string
        to:
          type: string
        amount:
          type: integer
        fee:
          type: integer
        nonce:
          type: integer
        blockHash:
          type: ["string", "null"]
        blockHeight:
          type: ["integer", "null"]
        timestamp:
          type: integer
        status:
          type: string
          enum: [pending, confirmed, failed]

    SignedTxInput:
      type: object
      required: [from, to, amount, fee, nonce, signature, publicKey]
      properties:
        from:
          type: string
        to:
          type: string
        amount:
          type: integer
        fee:
          type: integer
        nonce:
          type: integer
        signature:
          type: string
        publicKey:
          type: string

    BroadcastResult:
      type: object
      required: [txHash, status]
      properties:
        txHash:
          type: string
        status:
          type: string

    AddressInfo:
      type: object
      required: [address, balance, nonce, txCount, transactions]
      properties:
        address:
          type: string
        balance:
          type: integer
        nonce:
          type: integer
        txCount:
          type: integer
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"

    Mempool:
      type: object
      required: [count, pressure, transactions]
      properties:
        count:
          type: integer
        pressure:
          type: number
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Validator:
      type: object
      required:
        - address
        - moniker
        - bondedStake
        - accumulatedRewards
        - slashed
        - slashCount
        - jailed
        - uptime
        - blocksProposed
        - blocksVoted
        - commission
        - sharePercent
      properties:
        address:
          type: string
        moniker:
          type: string
        bondedStake:
          type: number
        accumulatedRewards:
          type: number
        slashed:
          type: boolean
        slashCount:
          type: integer
        jailed:
          type: boolean
        uptime:
          type: number
        blocksProposed:
          type: integer
        blocksVoted:
          type: integer
        commission:
          type: number
        sharePercent:
          type: number

    ValidatorList:
      type: object
      required: [count, totalBondedStake, validators]
      properties:
        count:
          type: integer
        totalBondedStake:
          type: number
        validators:
          type: array
          items:
            $ref: "#/components/schemas/Validator"

    SlashEvent:
      type: object
      required: [validatorAddress, reason, slashAmount, height, timestamp]
      properties:
        validatorAddress:
          type: string
        reason:
          type: string
          enum: [double_sign, downtime, invalid_block]
        slashAmount:
          type: number
        height:
          type: integer
        timestamp:
          type: integer

    ValidatorDetail:
      allOf:
        - $ref: "#/components/schemas/Validator"
        - type: object
          required: [slashHistory]
          properties:
            slashHistory:
              type: array
              items:
                $ref: "#/components/schemas/SlashEvent"

    Delegator:
      type: object
      required:
        - address
        - stakedAmount
        - sharePercent
        - rewardsEarned
        - slashExposureDoubleSign
        - slashExposureDowntime
        - startHeight
        - startTimestamp
        - unbonding
      properties:
        address:
          type: string
        stakedAmount:
          type: number
        sharePercent:
          type: number
        rewardsEarned:
          type: number
        slashExposureDoubleSign:
          type: number
        slashExposureDowntime:
          type: number
        startHeight:
          type: integer
        startTimestamp:
          type: integer
        unbonding:
          type: boolean

    DelegatorsResponse:
      type: object
      required: [validatorAddress, count, totalDelegated, delegators]
      properties:
        validatorAddress:
          type: string
        count:
          type: integer
        totalDelegated:
          type: number
        delegators:
          type: array
          items:
            $ref: "#/components/schemas/Delegator"

    ProposalSummary:
      type: object
      required:
        - id
        - type
        - title
        - proposer
        - submittedAt
        - votingEndsAt
        - votesYes
        - votesNo
        - votesAbstain
        - quorumReached
        - passThreshold
        - status
        - totalVotingPower
        - quorumPct
      properties:
        id:
          type: string
        type:
          type: string
          enum: [text, parameter_change]
        title:
          type: string
        proposer:
          type: string
        submittedAt:
          type: integer
        votingEndsAt:
          type: integer
        votesYes:
          type: number
        votesNo:
          type: number
        votesAbstain:
          type: number
        quorumReached:
          type: boolean
        passThreshold:
          type: boolean
        status:
          type: string
          enum: [active, passed, rejected, executed]
        totalVotingPower:
          type: number
        quorumPct:
          type: number

    ProposalList:
      type: object
      required: [count, proposals]
      properties:
        count:
          type: integer
        proposals:
          type: array
          items:
            $ref: "#/components/schemas/ProposalSummary"

    SlashInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          enum: [double_sign, downtime, invalid_block]
        proposalId:
          type: integer
          description: Required when the admin multisig is configured — must reference an approved proposal

    SlashResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        validator:
          $ref: "#/components/schemas/Validator"

    MultisigInfo:
      type: object
      required: [configured]
      properties:
        configured:
          type: boolean
        address:
          type: string
        ownerCount:
          type: integer
        threshold:
          type: integer
        finalized:
          type: boolean

    ProposeResult:
      type: object
      required: [proposalId]
      properties:
        proposalId:
          type: integer

    ApproveInput:
      type: object
      required: [ownerIndex, pubkey, signature]
      properties:
        ownerIndex:
          type: integer
        pubkey:
          type: string
          description: Hex-encoded raw Ed25519 public key (32 bytes = 64 hex chars)
        signature:
          type: string
          description: Ed25519 signature over UTF-8("equilibrium-multisig-approve:{multisigAddress}:{proposalId}") — 64 bytes = 128 hex chars

    ApproveResult:
      type: object
      required: [approved, thresholdMet]
      properties:
        approved:
          type: boolean
        thresholdMet:
          type: boolean

    ProposalStatus:
      type: object
      required: [proposalId, approved]
      properties:
        proposalId:
          type: integer
        approved:
          type: boolean

    NewProposalInput:
      type: object
      required: [proposer, type, title, description]
      properties:
        proposer:
          type: string
        type:
          type: string
          enum: [text, parameter_change]
        title:
          type: string
        description:
          type: string
        parameterChange:
          type: object
          required: [key, value]
          properties:
            key:
              type: string
            value:
              type: number

    VoteInput:
      type: object
      required: [voter, choice, publicKey, signature]
      properties:
        voter:
          type: string
          description: The voter's 40-char hex address (derived from publicKey)
        choice:
          type: string
          enum: [yes, no, abstain]
        publicKey:
          type: string
          description: Hex-encoded raw Ed25519 public key (32 bytes = 64 hex chars)
        signature:
          type: string
          description: Ed25519 signature over UTF-8("vote:{proposalId}:{choice}") — 64 bytes = 128 hex chars

    VoteResult:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        proposal:
          $ref: "#/components/schemas/ProposalSummary"

    ChainParameters:
      type: object
      required:
        - baseReward
        - miningThreshold
        - unbondingPeriod
        - maxMempoolSize
        - minValidatorStake
      properties:
        baseReward:
          type: number
        miningThreshold:
          type: number
        unbondingPeriod:
          type: integer
        maxMempoolSize:
          type: integer
        minValidatorStake:
          type: number

    FaucetRequest:
      type: object
      required: [address]
      properties:
        address:
          type: string
          minLength: 40
          maxLength: 40
          description: 40-character hex Equilibrium address

    FaucetDripResponse:
      type: object
      required: [success, address, amount, balance, cooldownSeconds]
      properties:
        success:
          type: boolean

openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Equilibrium blockchain node RPC + block explorer API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chain
    description: Chain state and network info
  - name: blocks
    description: Block data
  - name: transactions
    description: Transaction data
  - name: addresses
    description: Address balances and history
  - name: mempool
    description: Pending transaction pool
  - name: validators
    description: Validator staking, rewards, and slashing
  - name: staking
    description: Delegator staking positions and bond/unbond actions
  - name: dex
    description: Native AMM DEX — pools, swaps, and liquidity management
  - name: governance
    description: On-chain governance proposals, voting, and chain parameters
  - name: admin
    description: On-chain M-of-N multisig gate for privileged admin actions (e.g. validator slashing)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /chain/status:
    get:
      operationId: getChainStatus
      tags: [chain]
      summary: Current chain state and network metrics
      responses:
        "200":
          description: Chain status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainStatus"

  /chain/stats:
    get:
      operationId: getChainStats
      tags: [chain]
      summary: Historical network stats for sparklines (last 20 blocks)
      responses:
        "200":
          description: Stats array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlockStat"

  /network/peers:
    get:
      operationId: getNetworkPeers
      tags: [chain]
      summary: Connected peer list
      responses:
        "200":
          description: Peer list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Peer"

  /blocks:
    get:
      operationId: listBlocks
      tags: [blocks]
      summary: Paginated list of blocks (newest first)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Block page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockPage"

  /blocks/{hashOrHeight}:
    get:
      operationId: getBlock
      tags: [blocks]
      summary: Block detail by hash or height
      parameters:
        - name: hashOrHeight
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Block detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Block"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /blocks/{hashOrHeight}/fees:
    get:
      operationId: getBlockFees
      tags: [blocks]
      summary: Fee breakdown for a block — account-model fees vs. swept UTXO fees
      parameters:
        - name: hashOrHeight
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Block fee breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockFees"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tx/{hash}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Transaction detail by hash
      parameters:
        - name: hash
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transaction detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /tx/broadcast:
    post:
      operationId: broadcastTransaction
      tags: [transactions]
      summary: Submit a signed transaction to the mempool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignedTxInput"
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BroadcastResult"
        "400":
          description: Invalid or rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /address/{addr}:
    get:
      operationId: getAddress
      tags: [addresses]
      summary: Address balance, nonce, and transaction history
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Address info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddressInfo"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /mempool:
    get:
      operationId: getMempool
      tags: [mempool]
      summary: Pending transactions in the mempool
      responses:
        "200":
          description: Mempool contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Mempool"

  /validators:
    get:
      operationId: listValidators
      tags: [validators]
      summary: All validators with bonded stake and share of the network
      responses:
        "200":
          description: Validator list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidatorList"

  /validators/{addr}:
    get:
      operationId: getValidator
      tags: [validators]
      summary: Validator detail, including slash history
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Validator detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidatorDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /validators/{addr}/delegators:
    get:
      operationId: getValidatorDelegators
      tags: [validators]
      summary: Live delegators of a validator with stake, rewards earned, and slash exposure
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Delegator list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DelegatorsResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /validators/{addr}/fees:
    get:
      operationId: getValidatorFees
      tags: [validators]
      summary: Fee earnings history for a validator, aggregated across every block it has mined (separate from block rewards)
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Fee earnings history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidatorFees"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /validators/{addr}/earnings:
    get:
      operationId: getValidatorEarnings
      tags: [validators]
      summary: Aggregate earnings summary for a validator (coinbase rewards + fee sweeps, no per-block history)
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Aggregate earnings summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidatorEarnings"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /validators/{addr}/slash:
    post:
      operationId: slashValidator
      tags: [validators]
      summary: Slash a validator. Requires multisig proposal approval when admin multisig is configured, otherwise falls back to the ADMIN_KEY header.
      parameters:
        - name: addr
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SlashInput"
      responses:
        "200":
          description: Validator slashed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlashResult"
        "400":
          description: Missing reason or proposalId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Forbidden — multisig threshold not met or invalid ADMIN_KEY
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Validator not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /admin/multisig:
    get:
      operationId: getAdminMultisigInfo
      tags: [admin]
      summary: Current admin multisig configuration and live on-chain status
      responses:
        "200":
          description: Multisig info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultisigInfo"

  /admin/multisig/propose:
    post:
      operationId: proposeAdminAction
      tags: [admin]
      summary: Create a new admin action proposal (e.g. a pending validator slash) for owners to approve
      responses:
        "200":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposeResult"
        "400":
          description: Admin multisig is not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Failed to create proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /admin/multisig/{proposalId}/approve:
    post:
      operationId: approveAdminAction
      tags: [admin]
      summary: Submit one owner's Ed25519-signed approval for a proposal
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveInput"
      responses:
        "200":
          description: Approval recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApproveResult"
        "400":
          description: Invalid input or admin multisig not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /admin/multisig/{proposalId}:
    get:
      operationId: getAdminMultisigProposalStatus
      tags: [admin]
      summary: Check whether a proposal has met the multisig approval threshold
      parameters:
        - name: proposalId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proposal status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalStatus"
        "400":
          description: Invalid proposalId or admin multisig not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /governance/proposals:
    get:
      operationId: listProposals
      tags: [governance]
      summary: List all governance proposals with live vote tallies
      responses:
        "200":
          description: Proposal list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalList"
    post:
      operationId: createProposal
      tags: [governance]
      summary: Submit a new governance proposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewProposalInput"
      responses:
        "201":
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalSummary"
        "400":
          description: Invalid proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /governance/proposals/{id}:
    get:
      operationId: getProposal
      tags: [governance]
      summary: Proposal detail with full voter breakdown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Proposal detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalSummary"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /governance/proposals/{id}/vote:
    post:
      operationId: voteOnProposal
      tags: [governance]
      summary: Cast or change a vote on a governance proposal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VoteInput"
      responses:
        "200":
          description: Vote recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoteResult"
        "400":
          description: Invalid vote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /governance/params:
    get:
      operationId: getChainParameters
      tags: [governance]
      summary: Current live chain parameters (modifiable via governance)
      responses:
        "200":
          description: Chain parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChainParameters"

  /faucet:
    post:
      operationId: requestFaucet
      tags: [faucet]
      summary: Request testnet tokens (1-hour cooldown per address)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaucetRequest"
      responses:
        "200":
          description: Tokens dripped successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaucetDripResponse"
        "400":
          description: Invalid address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limited — cooldown still active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /faucet/status/{address}:
    get:
      operationId: getFaucetStatus
      tags: [faucet]
      summary: Check faucet cooldown status for an address
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Faucet status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaucetStatus"

  /stake/{address}:
    get:
      operationId: getStakePositions
      tags: [staking]
      summary: Get all staking positions and unbonding entries for a delegator address
      parameters:
        - name: address
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stake positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StakePositions"

  /stake:
    post:
      operationId: stake
      tags: [staking]
      summary: Bond EQU to a validator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StakeInput"
      responses:
        "200":
          description: Stake recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StakeResult"
        "400":
          description: Invalid input or insufficient funds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /unstake:
    post:
      operationId: unstake
      tags: [staking]
      summary: Begin unbonding EQU from a validator
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UnstakeInput"
      responses:
        "200":
          description: Unbonding initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnstakeResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /staking/summary:
    get:
      operationId: getStakingSummary
      tags: [staking]
      summary: Network-wide staking summary statistics
      responses:
        "200":
          description: Staking summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StakingSummary"

  /dex/pools:
    get:
      operationId: listDexPools
      tags: [dex]
      summary: List all liquidity pools with live price and TVL
      responses:
        "200":
          description: Pool list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DexPoolList"

  /dex/pools/{id}:
    get:
      operationId: getDexPool
      tags: [dex]
      summary: Get a single pool with its liquidity positions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pool detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DexPoolDetail"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /dex/swap:
    post:
      operationId: dexSwap
      tags: [dex]
      summary: Execute a token swap against a pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SwapInput"
      responses:
        "200":
          description: Swap executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwapResult"
        "400":
          description: Invalid input or swap error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /dex/liquidity/add:
    post:
      operationId: addLiquidity
      tags: [dex]
      summary: Provide liquidity to a pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddLiquidityInput"
      responses:
        "200":
          description: Liquidity added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddLiquidityResult"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /dex/swaps:
    get:
      operationId: listDexSwaps
      tags: [dex]
      summary: Recent swap history (latest first)
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Swap history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwapHistory"

  /dex/positions/{provider}:
    get:
      operationId: getDexPositions
      tags: [dex]
      summary: Get all liquidity positions for a provider address
      parameters:
        - name: provider
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Provider positions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderPositions"

  /dex/quote:
    get:
      operationId: getDexQuote
      tags: [dex]
      summary: Get a swap quote without executing the trade
      parameters:
        - name: poolId
          in: query
          required: true
          schema:
            type: string
        - name: tokenIn
          in: query
          required: true
          schema:
            type: string
        - name: amountIn
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Swap quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SwapQuote"
        "404":
          description: Pool not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /mobile/version:
    get:
      operationId: getMobileVersion
      tags: [mobile]
      summary: Latest published build metadata for a platform (polled by the app's "check for updates" screen)
      parameters:
        - name: platform
          in: query
          required: true
          schema:
            type: string
            example: android
      responses:
        "200":
          description: Latest release metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppRelease"
        "400":
          description: Missing platform query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: No published release for this platform
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      operationId: publishMobileVersion
      tags: [mobile]
      summary: Publish (upsert) the latest build metadata for a platform. Admin-key protected; called by CI after a signed release build.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishAppReleaseRequest"
      responses:
        "200":
          description: Published release metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppRelease"
        "400":
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing or invalid X-Admin-Key header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ChainStatus:
      type: object
      required:
        - height
        - latestHash
        - latestTimestamp
        - totalTxCount
        - mempoolSize
        - mempoolPressure
        - validatorCount
        - cumulativeWork
        - lastResidual
        - avgBlockTime
        - tps
      properties:
        height:
          type: integer
        latestHash:
          type: string
        latestTimestamp:
          type: integer
        totalTxCount:
          type: integer
        mempoolSize:
          type: integer
        mempoolPressure:
          type: number
        validatorCount:
          type: integer
        cumulativeWork:
          type: integer
        lastResidual:
          type: number
        avgBlockTime:
          type: number
        tps:
          type: number

    BlockStat:
      type: object
      required: [height, txCount, residual, mempoolPressure, timestamp]
      properties:
        height:
          type: integer
        txCount:
          type: integer
        residual:
          type: number
        mempoolPressure:
          type: number
        timestamp:
          type: integer

    Peer:
      type: object
      required: [peerId, address, latencyMs, height, connected]
      properties:
        peerId:
          type: string
        address:
          type: string
        latencyMs:
          type: integer
        height:
          type: integer
        connected:
          type: boolean

    Block:
      type: object
      required:
        - hash
        - height
        - prevHash
        - merkleRoot
        - timestamp
        - nonce
        - difficulty
        - residual
        - recursionDepth
        - coinbaseReward
        - miner
        - txCount
        - transactions
      properties:
        hash:
          type: string
        height:
          type: integer
        prevHash:
          type: string
        merkleRoot:
          type: string
        timestamp:
          type: integer
        nonce:
          type: integer
        difficulty:
          type: integer
        residual:
          type: number
        recursionDepth:
          type: integer
        coinbaseReward:
          type: integer
        miner:
          type: string
        txCount:
          type: integer
        transactions:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"

    BlockFees:
      type: object
      required:
        - height
        - hash
        - miner
        - coinbaseReward
        - accountFees
        - utxoFees
        - totalFees
        - totalMinerEarnings
      properties:
        height:
          type: integer
        hash:
          type: string
        miner:
          type: string
        coinbaseReward:
